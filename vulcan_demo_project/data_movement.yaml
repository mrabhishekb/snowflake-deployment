version: v1alpha
type: vulcan
name: sf-data-movement-workflow
tags:
  - snowflake-to-snowflake
  - data-movement
spec:
  runAsUser: "abhishekbharadwajtmdcio"
  compute: ct-sandbox
  engine: snowflake
  repo:
    url: https://github.com/mrabhishekb/snowflake-deployment
    syncFlags:
      - "--submodules=off"
    baseDir: snowflake-deployment/vulcan_demo_project
    secret: ct-sandbox:git-sync-mrab
  depots:
    - dataos://sfsampledatasetdepot?purpose=rw
  workflow:
    type: schedule
    schedule:
      crons:
        - "*/60 * * * *"
      endOn: "2027-01-01T00:00:00-00:00"
      timezone: "US/Pacific"
      concurrencyPolicy: Forbid
    logLevel: INFO
    resource:
      request:
        cpu: "500m"
        memory: "512Mi"
      limit:
        cpu: "1000m"
        memory: "1Gi"
    migrate:
      command:
        - vulcan
      arguments:
        - migrate
    plan:
      command:
        - vulcan
      arguments:
        - --log-to-stdout
        - plan
        - --auto-apply
    run:
      command:
        - vulcan
      arguments:
        - --log-to-stdout
        - run
  api:
    replicas: 1
    logLevel: INFO
    resource:
      request:
        cpu: "500m"
        memory: "512Mi"
      limit:
        cpu: "1000m"
        memory: "1Gi"