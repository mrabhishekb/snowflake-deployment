version: v1alpha
type: app
name: fancy-text-app
title: Fancy Text App
description: App to display fancy text
owner: aishwaryasharmatmdcio
tags:
  - app
  - streamlit
spec:
  compute: ct-sandbox
  runAsUser: aishwaryasharmatmdcio
  logLevel: INFO
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    type: streamlit #Confusion
    image: tmdcio/obsolescence_dashboard:0.001
    imagePullSecret: docker-image-pull-secret
    command:
      - streamlit
    arguments:
      - run
      - app.py
      - --server.port=8501
      - --server.address=0.0.0.0
      - --server.headless=true
      - --browser.gatherUsageStats=false
    port: 8501
    envs: {}
    hostname: fancytextapp
    stateful: false
    http:
      stripPath: true
      path: /fancytextapp
      ingress:
        enabled: true
        stripPath: true
        appDetailSpec: fancy-text-app
  app:
    icon: "data:image/svg+xml;base64,"
    domain: platform
    description: Streamlit app that displays fancy text
    tags:
      - app
      - streamlit
      - fancy text app
    owners:
      - aishwaryasharmatmdcio
    products:
      - platform-observability
    references:
      - title: Nginx Docs
        url: https://nginx.org/en/docs/
    link:
      title: Open app
      url: https://saturn-040926.dataos.cloud/fancytextapp
